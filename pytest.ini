[pytest]
# =============================================================================
# Pytest Configuration
# Network Automation Testing Framework
# =============================================================================

# Minimum pytest version
minversion = 7.0

# Test discovery paths
testpaths = tests

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Markers for test categorization
markers =
    smoke: Quick smoke tests for critical paths (fast, run on every commit)
    sanity: Sanity tests for core functionality (medium speed)
    regression: Full regression suite (comprehensive)
    network: Network/PyATS tests requiring DevNet Sandbox
    api: API tests using requests/httpx
    ui: UI tests using Playwright
    database: Database validation tests
    integration: Integration and E2E tests
    slow: Slow running tests (>30 seconds)
    visual: Visual regression tests (screenshot comparison)
    accessibility: Accessibility/WCAG compliance tests
    crossbrowser: Cross-browser compatibility tests
    flaky: Known flaky tests (will be retried)

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Log file configuration
log_file = reports/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Async mode for pytest-asyncio
asyncio_mode = auto

# Timeout for tests (optional, requires pytest-timeout)
# timeout = 300

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

