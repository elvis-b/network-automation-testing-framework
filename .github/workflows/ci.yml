name: CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run full regression nightly at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - sanity
          - regression
          - all

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TEST_ADMIN_USERNAME: 'admin'
  TEST_ADMIN_PASSWORD: 'admin123'

jobs:
  # ===========================================================================
  # Code Quality Check
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      
      - name: Run flake8
        run: flake8 backend pages services tests utils --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true
      
      - name: Check formatting with black
        run: black --check --diff backend pages services tests utils
        continue-on-error: true
      
      - name: Check import sorting
        run: isort --check-only --diff backend pages services tests utils
        continue-on-error: true

  # ===========================================================================
  # Backend Tests (API + Database)
  # ===========================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Wait for MongoDB
        run: |
          python - <<'PY'
          import time
          import pymongo

          deadline = time.time() + 90
          last_error = None

          while time.time() < deadline:
              try:
                  client = pymongo.MongoClient("mongodb://localhost:27017/", serverSelectionTimeoutMS=2000)
                  client.admin.command("ping")
                  print("MongoDB is ready")
                  break
              except Exception as exc:
                  last_error = exc
                  print("Waiting for MongoDB...")
                  time.sleep(2)
          else:
              raise SystemExit(f"MongoDB did not become ready in time: {last_error}")
          PY
      
      - name: Seed test data
        run: |
          python - <<'PY'
          import os
          import bcrypt
          from datetime import datetime
          from pymongo import MongoClient

          username = os.getenv("TEST_ADMIN_USERNAME", "admin")
          password = os.getenv("TEST_ADMIN_PASSWORD", "admin123")
          client = MongoClient("mongodb://localhost:27017/")
          db = client["network_monitoring"]
          password_hash = bcrypt.hashpw(password.encode("utf-8"), bcrypt.gensalt()).decode("utf-8")

          db.users.update_one(
              {"username": username},
              {"$set": {
                  "username": username,
                  "email": "admin@example.com",
                  "password_hash": password_hash,
                  "role": "admin",
                  "is_active": True,
                  "created_at": datetime.utcnow(),
              }},
              upsert=True,
          )

          db.devices.update_one(
              {"name": "test-router-01"},
              {"$set": {"name": "test-router-01", "ip_address": "192.168.1.1", "device_type": "router", "vendor": "cisco", "status": "active"}},
              upsert=True,
          )
          db.devices.update_one(
              {"name": "test-switch-01"},
              {"$set": {"name": "test-switch-01", "ip_address": "192.168.1.2", "device_type": "switch", "vendor": "cisco", "status": "active"}},
              upsert=True,
          )

          db.alerts.update_one(
              {"message": "Test alert"},
              {"$set": {
                  "device_name": "test-router-01",
                  "severity": "warning",
                  "type": "performance",
                  "message": "Test alert",
                  "acknowledged": False,
              }},
              upsert=True,
          )
          print("Seeded backend test data")
          PY
        env:
          MONGODB_URI: mongodb://localhost:27017/
      
      - name: Start backend
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 5000 &
          sleep 5
        env:
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: network_monitoring
          JWT_SECRET: test-secret-key
      
      - name: Run smoke tests
        run: pytest tests/api/ -m smoke -v --tb=short --alluredir=allure-results/backend
        env:
          API_BASE_URL: http://localhost:5000/api
      
      - name: Run API tests
        if: github.event.inputs.test_scope != 'smoke'
        run: pytest tests/api/ -v --tb=short --html=reports/api-report.html --self-contained-html --alluredir=allure-results/backend
        env:
          API_BASE_URL: http://localhost:5000/api
      
      - name: Run database tests
        if: github.event.inputs.test_scope != 'smoke'
        run: pytest tests/database/ -v --tb=short --html=reports/db-report.html --self-contained-html --alluredir=allure-results/backend
        env:
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: network_monitoring
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            reports/
            allure-results/backend/
          retention-days: 30

  # ===========================================================================
  # UI Tests with Playwright
  # ===========================================================================
  ui-tests:
    name: UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: backend-tests
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: playwright install ${{ matrix.browser }} --with-deps
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Seed test data
        run: |
          python - <<'PY'
          import os
          import bcrypt
          from datetime import datetime
          from pymongo import MongoClient

          username = os.getenv("TEST_ADMIN_USERNAME", "admin")
          password = os.getenv("TEST_ADMIN_PASSWORD", "admin123")
          client = MongoClient("mongodb://localhost:27017/")
          db = client["network_monitoring"]
          password_hash = bcrypt.hashpw(password.encode("utf-8"), bcrypt.gensalt()).decode("utf-8")

          db.users.update_one(
              {"username": username},
              {"$set": {
                  "username": username,
                  "email": "admin@example.com",
                  "password_hash": password_hash,
                  "role": "admin",
                  "is_active": True,
                  "created_at": datetime.utcnow(),
              }},
              upsert=True,
          )

          devices = [
              {"name": "Core-Router-01", "ip_address": "192.168.1.1", "device_type": "router", "vendor": "cisco", "model": "CSR1000v", "status": "active", "location": "Data Center A"},
              {"name": "Edge-Switch-01", "ip_address": "192.168.1.2", "device_type": "switch", "vendor": "cisco", "model": "Catalyst 9300", "status": "active", "location": "Data Center A"},
              {"name": "Backup-Router-01", "ip_address": "192.168.2.1", "device_type": "router", "vendor": "cisco", "model": "ISR 4321", "status": "inactive", "location": "Data Center B"},
          ]
          for device in devices:
              db.devices.update_one({"name": device["name"]}, {"$set": device}, upsert=True)

          alerts = [
              {"device_name": "Core-Router-01", "severity": "critical", "type": "connectivity", "message": "High packet loss detected", "acknowledged": False, "timestamp": datetime.utcnow()},
              {"device_name": "Edge-Switch-01", "severity": "warning", "type": "performance", "message": "CPU utilization at 85%", "acknowledged": False, "timestamp": datetime.utcnow()},
          ]
          for alert in alerts:
              db.alerts.update_one({"message": alert["message"]}, {"$set": alert}, upsert=True)
          print("Seeded UI test data")
          PY
      
      - name: Start backend
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 5000 &
          sleep 5
        env:
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: network_monitoring
          JWT_SECRET: test-secret-key
      
      - name: Start frontend
        working-directory: frontend
        run: npm run dev &
        env:
          VITE_API_URL: http://localhost:5000/api
      
      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Frontend is ready"
      
      - name: Run UI smoke tests
        run: |
          pytest tests/ui/ -m smoke -v \
            --browser=${{ matrix.browser }} \
            --tb=short \
            --html=reports/ui-smoke-${{ matrix.browser }}.html \
            --self-contained-html \
            --alluredir=allure-results/ui-${{ matrix.browser }}
        env:
          FRONTEND_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:5000/api
      
      - name: Run UI regression tests
        if: github.event.inputs.test_scope == 'regression' || github.event.inputs.test_scope == 'all'
        run: |
          pytest tests/ui/ -m regression -v \
            --browser=${{ matrix.browser }} \
            --tb=short \
            --html=reports/ui-regression-${{ matrix.browser }}.html \
            --self-contained-html \
            --alluredir=allure-results/ui-${{ matrix.browser }}
        env:
          FRONTEND_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:5000/api
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}
          path: |
            reports/
            test-results/
            allure-results/ui-${{ matrix.browser }}/
          retention-days: 30

  # ===========================================================================
  # Network Tests (PyATS) - Optional
  # ===========================================================================
  network-tests:
    name: Network Tests (PyATS)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.inputs.test_scope == 'all' || github.event_name == 'schedule'
    continue-on-error: true  # Don't fail the pipeline if DevNet is unavailable
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run network tests
        run: pytest tests/network/ -m network -v --tb=short --html=reports/network-report.html --self-contained-html --alluredir=allure-results/network
        env:
          PYATS_TESTBED: config/testbeds/devnet_sandbox.yaml
        continue-on-error: true
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-test-reports
          path: |
            reports/
            allure-results/network/
          retention-days: 30

  # ===========================================================================
  # Integration Tests
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests]
    if: github.event.inputs.test_scope == 'all' || github.event_name == 'schedule'
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Seed test data
        run: |
          python - <<'PY'
          import os
          import bcrypt
          from datetime import datetime
          from pymongo import MongoClient

          username = os.getenv("TEST_ADMIN_USERNAME", "admin")
          password = os.getenv("TEST_ADMIN_PASSWORD", "admin123")
          client = MongoClient("mongodb://localhost:27017/")
          db = client["network_monitoring"]
          password_hash = bcrypt.hashpw(password.encode("utf-8"), bcrypt.gensalt()).decode("utf-8")
          db.users.update_one(
              {"username": username},
              {"$set": {
                  "username": username,
                  "email": "admin@example.com",
                  "password_hash": password_hash,
                  "role": "admin",
                  "is_active": True,
                  "created_at": datetime.utcnow(),
              }},
              upsert=True,
          )
          print("Seeded integration test data")
          PY
      
      - name: Start services
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 5000 &
          sleep 5
        env:
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: network_monitoring
          JWT_SECRET: test-secret-key
      
      - name: Run integration tests
        run: pytest tests/integration/ -m integration -v --tb=short --html=reports/integration-report.html --self-contained-html --alluredir=allure-results/integration
        env:
          API_BASE_URL: http://localhost:5000/api
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DATABASE: network_monitoring
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            reports/
            allure-results/integration/
          retention-days: 30

  # ===========================================================================
  # Docker Build Test
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: network-monitoring-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: network-monitoring-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Summary Report
  # ===========================================================================
  report:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests, integration-tests, network-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
      
      - name: List reports
        run: |
          echo "## Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find all-reports -name "*.html" -type f | while read report; do
            echo "- $report" >> $GITHUB_STEP_SUMMARY
          done
      
      - name: Check test results
        run: |
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests | ${{ needs.ui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Network Tests | ${{ needs.network-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Merge Allure result files
        run: |
          mkdir -p allure-results
          find all-reports -type d -path "*/allure-results/*" -print0 | while IFS= read -r -d '' dir; do
            cp -R "$dir"/. allure-results/ || true
          done
          # Some artifacts may include the top-level allure-results dir directly.
          find all-reports -type d -name "allure-results" -print0 | while IFS= read -r -d '' dir; do
            cp -R "$dir"/. allure-results/ || true
          done
          # Add executor metadata to avoid "unknown" labels in the report header.
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          }
          EOF
          echo "Merged Allure files:"
          ls -la allure-results | head -100

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Allure CLI
        run: npm install -g allure-commandline --unsafe-perm

      - name: Generate Allure dashboard
        run: |
          allure generate allure-results --clean -o allure-history

      - name: Publish Allure to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Add QA dashboard link
        if: github.event_name != 'pull_request'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## QA Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "- [Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

